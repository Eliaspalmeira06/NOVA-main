name: Pipeline CI/CD Nova-Alpha

# Se activa al hacer 'push' o 'pull request' hacia la rama main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # TRABAJO 1: Verificación de dependencias y compilación
  build-and-test:
    name: Compilación y Calidad de Código
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código del repositorio
      - name: Descargar código
        uses: actions/checkout@v4

      # Paso 2: Configurar entorno Node.js
      - name: Configurar Node.js v18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # Optimiza el tiempo guardando descargas previas en caché

      # Paso 3: Instalar dependencias del proyecto
      - name: Instalar dependencias
        run: npm ci || npm install

      # Paso 4: Comprobar tipos de TypeScript y compilar (React / TS)
      - name: Validar compilación de TypeScript y React
        run: npm run build --if-present

  # TRABAJO 2: Construcción del contenedor Docker
  docker-build:
    name: Validación de Imagen Docker
    needs: build-and-test # Solo ejecuta este paso si el trabajo de compilación previo fue exitoso
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      # Paso 5: Probar que el Dockerfile genera la imagen correctamente
      - name: Construir imagen Docker
        run: docker build -t nova-alpha-app:latest .